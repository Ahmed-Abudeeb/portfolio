bio:
  - "I am a Master's student in Chemical Engineering at King Fahd University of Petroleum and Minerals (KFUPM), currently conducting thesis research focused on developing a machine learning-based equation of state (EoS) for Lennard-Jones fluids. I hold a Bachelor's degree in Chemical Engineering from KFUPM with a concentration in Renewable Energy and Energy Storage."
  - "My research bridges chemical thermodynamics with modern AI for predictive modeling. I have experience in process simulation, reactor design, catalyst evaluation, and computational chemistry. I thrive in collaborative environments where complex problems require both deep domain knowledge and creative, data-driven approaches."
